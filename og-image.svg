<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 도트 -->
  <circle cx="100" cy="100" r="3" fill="#2563EB" opacity="0.6"/>
  <circle cx="1100" cy="80" r="4" fill="#3B82F6" opacity="0.5"/>
  <circle cx="200" cy="550" r="3" fill="#2563EB" opacity="0.4"/>
  <circle cx="1050" cy="520" r="5" fill="#3B82F6" opacity="0.6"/>
  <circle cx="950" cy="150" r="2" fill="#60A5FA" opacity="0.7"/>

  <!-- 배지 -->
  <rect x="120" y="180" width="220" height="46" rx="23" fill="#1E40AF" opacity="0.3"/>
  <text x="230" y="210" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#93C5FD" text-anchor="middle" letter-spacing="1">FREE TOOLS · 회원가입 불필요</text>

  <!-- 메인 타이틀 -->
  <text x="120" y="320" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif" font-size="80" font-weight="800" fill="#FFFFFF" letter-spacing="-2">필요할 때 바로 쓰는</text>
  <text x="120" y="410" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif" font-size="80" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">일상의 </tspan>
    <tspan fill="url(#accent)">무료 도구</tspan>
  </text>

  <!-- 서브카피 -->
  <text x="120" y="470" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif" font-size="24" font-weight="500" fill="#94A3B8">복지 · 금융 · 생활에 필요한 계산기와 도구를 한 곳에서</text>

  <!-- 도메인 -->
  <text x="120" y="560" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif" font-size="28" font-weight="700">
    <tspan fill="#FFFFFF">beautypang</tspan><tspan fill="#3B82F6">.tools</tspan>
  </text>

  <!-- 우측 장식 아이콘 (계산기 형태) -->
  <g transform="translate(900, 280) scale(1.5)">
    <rect x="0" y="0" width="120" height="160" rx="14" fill="#1E40AF" opacity="0.25"/>
    <rect x="12" y="14" width="96" height="32" rx="6" fill="#2563EB" opacity="0.5"/>
    <circle cx="32" cy="76" r="10" fill="#3B82F6" opacity="0.6"/>
    <circle cx="60" cy="76" r="10" fill="#3B82F6" opacity="0.6"/>
    <circle cx="88" cy="76" r="10" fill="#3B82F6" opacity="0.6"/>
    <circle cx="32" cy="104" r="10" fill="#3B82F6" opacity="0.5"/>
    <circle cx="60" cy="104" r="10" fill="#3B82F6" opacity="0.5"/>
    <circle cx="88" cy="104" r="10" fill="#3B82F6" opacity="0.5"/>
    <circle cx="32" cy="132" r="10" fill="#3B82F6" opacity="0.4"/>
    <circle cx="60" cy="132" r="10" fill="#3B82F6" opacity="0.4"/>
    <circle cx="88" cy="132" r="10" fill="#F59E0B" opacity="0.7"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- 원형 크롭 대비 풀블리드 배경 -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 장식 도트 (코너, 원형크롭 밖이라 살짝만) -->
  <circle cx="150" cy="170" r="6" fill="#3B82F6" opacity="0.5"/>
  <circle cx="930" cy="200" r="8" fill="#2563EB" opacity="0.45"/>
  <circle cx="180" cy="900" r="7" fill="#60A5FA" opacity="0.4"/>
  <circle cx="910" cy="880" r="6" fill="#3B82F6" opacity="0.5"/>

  <!-- 중앙 아이콘: 건강 체크 모티프 (펄스 라인 + 체크) -->
  <g transform="translate(540, 415)">
    <circle cx="0" cy="0" r="180" fill="url(#accent)" opacity="0.12"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.5"/>
    <!-- 심박/측정 펄스 라인 -->
    <path d="M -120 10 L -60 10 L -30 -55 L 5 70 L 38 -20 L 65 10 L 120 10"
          fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 워드마크 -->
  <text x="540" y="710" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif"
        font-size="128" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-3">뷰티팡</text>

  <!-- 서브 태그 -->
  <text x="540" y="788" font-family="'Malgun Gothic','Apple SD Gothic Neo',-apple-system,'Segoe UI',sans-serif"
        font-size="40" font-weight="600" fill="#93C5FD" text-anchor="middle" letter-spacing="2">30초 건강 숫자 체크</text>
</svg>
